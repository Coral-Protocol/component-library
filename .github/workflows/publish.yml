name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build
      #
      # - name: Test
      #   run: yarn test

      - name: Publish to npm
        run: yarn npm publish
